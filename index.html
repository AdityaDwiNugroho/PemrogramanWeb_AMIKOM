<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Pemrograman Web</title>
    <link rel="icon" href="/favicon.png" type="image/png">
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css?v=1">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Pemrograman Web</h1>
            <p>Universitas Amikom Yogyakarta</p>
        </header>

        <main class="card">
            <ul class="link-list" id="directory-list">
                
                <li class="link-item">
                    <a href="pertemuan-1">
                        <div style="display: flex; align-items: center; gap: 1rem;">
                            <span class="icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
                            </span>
                            Pertemuan Ke 1
                        </div>
                        <span class="arrow">➜</span>
                    </a>
                </li>
                <li class="link-item">
                    <a href="pertemuan-2">
                        <div style="display: flex; align-items: center; gap: 1rem;">
                            <span class="icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
                            </span>
                            Pertemuan Ke 2
                        </div>
                        <span class="arrow">➜</span>
                    </a>
                </li>

            </ul>
        </main>

        <footer class="footer">
            <p>&copy; 2026 Aditya Dwi Nugroho | <a href="https://github.com/AdityaDwiNugroho/PemrogramanWeb_AMIKOM" target="_blank">Repository</a></p>
        </footer>
    </div>

    <script>
        async function fetchDirectories() {
            const repo = "AdityaDwiNugroho/PemrogramanWeb_AMIKOM"; 
            const apiURL = "https://api.github.com/repos/" + repo + "/contents";
            const listElement = document.getElementById("directory-list");

            try {
                const response = await fetch(apiURL);
                if (!response.ok) return;
                const data = await response.json();

                const existingText = listElement.innerText;

                data.forEach(folder => {
                    if (folder.type === "dir" && !folder.name.startsWith(".")) {
                        let displayName = folder.name;
                        if (folder.name.startsWith("pertemuan-")) {
                            const num = folder.name.split("-")[1];
                            displayName = "Pertemuan Ke " + num;
                        }

                        if (!existingText.includes(displayName)) {
                            const folderPath = encodeURIComponent(folder.name); 
                            const li = document.createElement("li");
                            li.className = "link-item";
                            li.innerHTML = `
                                <a href="${folderPath}">
                                    <div style="display: flex; align-items: center; gap: 1rem;">
                                        <span class="icon">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
                                        </span>
                                        ${displayName}
                                    </div>
                                    <span class="arrow">➜</span>
                                </a>
                            `;
                            listElement.appendChild(li);
                        }
                    }
                });

            } catch (error) {
                console.error("Auto detect failed, using static list.");
            }
        }

        document.addEventListener("DOMContentLoaded", fetchDirectories);

        // Anti-Inspection / Reverse Engineering Protection
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        }
    </script>
</body>
</html>
