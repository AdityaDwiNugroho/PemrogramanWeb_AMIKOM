<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Pemrograman Web</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #f8fafc; --surface-color: #ffffff; --text-primary: #0f172a; --text-secondary: #64748b; --brand-color: #3b82f6; --brand-hover: #2563eb; --border-color: #e2e8f0; --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05); --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); --radius-md: 0.5rem; --radius-lg: 0.75rem; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-primary); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 2rem; }
        .container { max-width: 600px; width: 100%; }
        .header { text-align: center; margin-bottom: 2.5rem; }
        .header h1 { font-size: 2.25rem; font-weight: 700; color: var(--text-primary); margin-bottom: 0.5rem; }
        .header p { color: var(--text-secondary); font-size: 1.125rem; }
        .card { background-color: var(--surface-color); border-radius: var(--radius-lg); box-shadow: var(--shadow-md); padding: 2rem; border: 1px solid var(--border-color); }
        .link-list { display: flex; flex-direction: column; gap: 1rem; list-style: none; }
        .link-item a { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.5rem; background-color: var(--surface-color); border: 1px solid var(--border-color); border-radius: var(--radius-md); color: var(--text-primary); text-decoration: none; font-weight: 500; font-size: 1.125rem; transition: all 0.2s ease; box-shadow: var(--shadow-sm); }
        .link-item a:hover { border-color: var(--brand-color); transform: translateY(-2px); box-shadow: var(--shadow-md); color: var(--brand-hover); }
        .icon { color: var(--brand-color); background-color: #eff6ff; padding: 0.5rem; border-radius: 0.375rem; display: flex; align-items: center; justify-content: center; }
        .arrow { color: var(--text-secondary); transition: transform 0.2s ease; }
        .link-item a:hover .arrow { color: var(--brand-color); transform: translateX(4px); }
        .footer { margin-top: 3rem; text-align: center; color: var(--text-secondary); font-size: 0.875rem; }
        .footer a { color: var(--brand-color); text-decoration: none; }
        .loading { text-align: center; color: var(--text-secondary); padding: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Pemrograman Web</h1>
            <p>Universitas Amikom Yogyakarta</p>
        </header>

        <main class="card">
            <ul class="link-list" id="directory-list">
                <div class="loading">Memuat daftar tugas dari Github...</div>
            </ul>
        </main>

        <footer class="footer">
            <p>&copy; 2026 Aditya Dwi Nugroho | <a href="https://github.com/AdityaDwiNugroho/PemrogramanWeb_AMIKOM" target="_blank">Repository</a></p>
        </footer>
    </div>

    <script>
        async function fetchDirectories() {
            const repo = "AdityaDwiNugroho/PemrogramanWeb_AMIKOM"; 
            const apiURL = "https://api.github.com/repos/" + repo + "/contents";
            const listElement = document.getElementById("directory-list");

            try {
                const response = await fetch(apiURL);
                if (!response.ok) throw new Error("Gagal mengambil data");
                const data = await response.json();

                // Filter hanya yang tipenya directory dan bukan folder tersembunyi/git
                const folders = data.filter(item => item.type === "dir" && !item.name.startsWith("."));
                
                listElement.innerHTML = '';

                if (folders.length === 0) {
                    listElement.innerHTML = '<div class="loading">Belum ada folder tugas.</div>';
                    return;
                }

                folders.forEach(folder => {
                    // encode path: "Pertemuan Ke 1" menjadi "Pertemuan%20Ke%201/index.html"
                    const folderPath = encodeURIComponent(folder.name) + "/index.html"; 
                    const li = document.createElement("li");
                    li.className = "link-item";
                    li.innerHTML = \
                        <a href="\">
                            <div style="display: flex; align-items: center; gap: 1rem;">
                                <span class="icon">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                                    </svg>
                                </span>
                                \
                            </div>
                            <span class="arrow">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                    <polyline points="12 5 19 12 12 19"></polyline>
                                </svg>
                            </span>
                        </a>
                    \;
                    listElement.appendChild(li);
                });

            } catch (error) {
                listElement.innerHTML = '<div class="loading" style="color:red">Terjadi kesalahan. Data folder tidak dapat dimuat.</div>';
            }
        }

        document.addEventListener("DOMContentLoaded", fetchDirectories);
    </script>
</body>
</html>
